<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kolligent — Browser Call Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.10.0/dist/twilio.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .header p {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #64748b;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .status-dot.ready {
            background: #22c55e;
        }

        .status-dot.on-call {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        .status-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        #status-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #6366f1;
        }

        input::placeholder {
            color: #475569;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #4f46e5;
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #16a34a;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
        }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #334155;
            color: #e2e8f0;
        }

        .log-box {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px;
            height: 160px;
            overflow-y: auto;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .log-entry.info {
            color: #94a3b8;
        }

        .log-entry.success {
            color: #22c55e;
        }

        .log-entry.warning {
            color: #f59e0b;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .divider {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 24px 0;
        }

        .auth-section {
            display: flex;
            gap: 10px;
        }

        .auth-section input {
            flex: 1;
        }

        .auth-section .btn {
            width: auto;
            padding: 10px 16px;
            margin: 0;
            font-size: 13px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <h1>🎙 Kolligent</h1>
            <p>Browser Call Test</p>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Not connected</span>
        </div>

        <!-- Auth -->
        <div class="section">
            <label>Backend URL</label>
            <input type="text" id="backend-url" value="http://127.0.0.1:8000" />
        </div>

        <div class="section">
            <label>JWT Token (from sign-in)</label>
            <div class="auth-section">
                <input type="text" id="jwt-token" placeholder="eyJhbGci..." />
                <button class="btn btn-secondary" onclick="connect()">Connect</button>
            </div>
        </div>

        <hr class="divider">

        <!-- Call -->
        <div class="section">
            <label>Phone Number to Call</label>
            <input type="text" id="phone-number" placeholder="+972509444706" value="+972509444706" />
        </div>

        <button class="btn btn-success" id="btn-call" onclick="startCall()" disabled>
            📞 Start Call
        </button>

        <button class="btn btn-danger" id="btn-hangup" onclick="hangup()" disabled>
            📵 Hang Up
        </button>

        <hr class="divider">

        <!-- Logs -->
        <label>Event Log</label>
        <div class="log-box" id="log-box">
            <div class="log-entry info">Waiting for connection...</div>
        </div>
    </div>

    <script>
        let device = null;
        let activeCall = null;

        // ── Logging ──────────────────────────────────────────────────
        function log(message, type = "info") {
            const box = document.getElementById("log-box");
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement("div");
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${time}] ${message}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        // ── Status ───────────────────────────────────────────────────
        function setStatus(text, state) {
            document.getElementById("status-text").textContent = text;
            const dot = document.getElementById("status-dot");
            dot.className = `status-dot ${state}`;
        }

        // ── Connect to Twilio ─────────────────────────────────────────
        async function connect() {
            const backendUrl = document.getElementById("backend-url").value.trim();
            const jwtToken = document.getElementById("jwt-token").value.trim();

            if (!jwtToken) {
                log("Please enter your JWT token first.", "error");
                return;
            }

            setStatus("Fetching access token...", "connecting");
            log("Connecting to backend...", "info");

            try {
                // Step 1 — Get Twilio Access Token from your backend
                const res = await fetch(`${backendUrl}/api/v1/calls/token`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${jwtToken}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Token fetch failed");
                }

                const data = await res.json();
                log(`Got Twilio token for identity: ${data.identity}`, "success");

                // Step 2 — Initialize Twilio Voice Device
                device = new Twilio.Device(data.token, {
                    logLevel: 1,
                    codecPreferences: ["opus", "pcmu"],
                });

                // Step 3 — Register event listeners
                device.on("registered", () => {
                    log("Device registered with Twilio ✅", "success");
                    setStatus("Ready to call", "ready");
                    document.getElementById("btn-call").disabled = false;
                });

                device.on("error", (error) => {
                    log(`Device error: ${error.message}`, "error");
                    setStatus("Error", "error");
                });

                device.on("incoming", (call) => {
                    log(`Incoming call from: ${call.parameters.From}`, "warning");
                    activeCall = call;
                    call.accept();
                });

                // Step 4 — Register the device
                await device.register();
                log("Registering device...", "info");

            } catch (err) {
                log(`Connection failed: ${err.message}`, "error");
                setStatus("Connection failed", "error");
            }
        }

        // ── Start Call ────────────────────────────────────────────────
        async function startCall() {
            const phoneNumber = document.getElementById("phone-number").value.trim();

            if (!phoneNumber) {
                log("Please enter a phone number.", "error");
                return;
            }

            if (!device) {
                log("Device not connected. Click Connect first.", "error");
                return;
            }

            log(`Initiating browser connection for ${phoneNumber}...`, "info");
            setStatus(`Calling...`, "on-call");

            try {
                // We call the SDK directly. 
                // This sends the "To" parameter to your /voice webhook.
                activeCall = await device.connect({
                    params: { To: phoneNumber }
                });

                activeCall.on("accept", () => {
                    log("Call accepted ✅", "success");
                    setStatus("On call", "on-call");
                    document.getElementById("btn-hangup").disabled = false;
                    document.getElementById("btn-call").disabled = true;
                });

                activeCall.on("disconnect", () => {
                    log("Call ended", "info");
                    setStatus("Ready to call", "ready");
                    document.getElementById("btn-hangup").disabled = true;
                    document.getElementById("btn-call").disabled = false;
                    activeCall = null;
                });

                activeCall.on("error", (error) => {
                    log(`Call error: ${error.message}`, "error");
                    setStatus("Call error", "error");
                });

            } catch (err) {
                log(`SDK Connection failed: ${err.message}`, "error");
                setStatus("Call failed", "error");
            }
        }
        // ── Hang Up ───────────────────────────────────────────────────
        function hangup() {
            if (activeCall) {
                activeCall.disconnect();
                log("Call disconnected by agent", "warning");
            }
            if (device) {
                device.disconnectAll();
            }
            setStatus("Ready to call", "ready");
            document.getElementById("btn-hangup").disabled = true;
            document.getElementById("btn-call").disabled = false;
        }
    </script>
</body>

</html>
