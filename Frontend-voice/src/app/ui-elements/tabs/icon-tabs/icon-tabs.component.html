
<ul class="navs-tabs mb-[20px] border-b border-gray-100 dark:border-[#172036]">
    <li class="nav-item inline-block ltr:mr-[25px] rtl:ml-[25px]" [ngClass]="{'active': currentTab === 'tab1'}">
        <button type="button" (click)="switchTab($event, 'tab1')" class="nav-link flex items-center gap-[4px] pb-[8px] transition-all relative font-medium">
            <i class="material-symbols-outlined !text-[20px]">
                home
            </i>
            Tab 1
        </button>
    </li>
    <li class="nav-item inline-block ltr:mr-[25px] rtl:ml-[25px]" [ngClass]="{'active': currentTab === 'tab2'}">
        <button type="button" (click)="switchTab($event, 'tab2')" class="nav-link flex items-center gap-[4px] pb-[8px] transition-all relative font-medium">
            <i class="material-symbols-outlined !text-[20px]">
                home
            </i>
            Tab 2
        </button>
    </li>
    <li class="nav-item inline-block ltr:mr-[25px] rtl:ml-[25px]" [ngClass]="{'active': currentTab === 'tab3'}">
        <button type="button" (click)="switchTab($event, 'tab3')" class="nav-link flex items-center gap-[4px] pb-[8px] transition-all relative font-medium">
            <i class="material-symbols-outlined !text-[20px]">
                home
            </i>
            Tab 3
        </button>
    </li>
</ul>
<div class="tab-content">
    @if (currentTab === 'tab1') {
        <div class="tab-pane">
            <p>
                Icon Tab 1 - Hello World!
            </p>
        </div>
    }
    @if (currentTab === 'tab2') {
        <div class="tab-pane">
            <p>
                Icon Tab 2 - Hello World!
            </p>
        </div>
    }
    @if (currentTab === 'tab3') {
        <div class="tab-pane">
            <p>
                Icon Tab 3 - Hello World!
            </p>
        </div>
    }
</div>
