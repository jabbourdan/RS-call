<div class="trezo-card bg-white dark:bg-[#0c1427] p-[20px] md:p-[25px] rounded-md">
    <div class="trezo-card-content">
        <div class="flex items-center justify-between mb-[10px]">
            <span class="block">
                {{ 'LEADS_PER_CAMPAIGN.TITLE' | translate }}
            </span>
            <div class="trezo-card-dropdown relative">
                <button
                    type="button"
                    class="trezo-card-dropdown-btn inline-block rounded-md bg-[#f5f7f8] dark:bg-[#0a0e19] py-[5px] md:py-[6.5px] px-[12px] md:px-[19px] transition-all hover:bg-gray-100 dark:hover:bg-dark"
                    (click)="toggleFilterMenu()"
                >
                    <span class="inline-block relative ltr:pr-[17px] ltr:md:pr-[20px] rtl:pl-[17px] rtl:md:pl-[20px]">
                        {{ currentFilterLabel | translate }}
                        <i class="ri-arrow-down-s-line text-lg absolute ltr:-right-[3px] rtl:-left-[3px] top-1/2 -translate-y-1/2 mt-px"></i>
                    </span>
                </button>
                @if (isFilterMenuOpen) {
                    <ul class="trezo-card-dropdown-menu transition-all bg-white shadow-3xl rounded-md top-full py-[15px] absolute ltr:right-0 rtl:left-0 w-[160px] z-[5] dark:bg-dark dark:shadow-none">
                        @for (option of filterOptions; track option.value) {
                            <li>
                                <button
                                    type="button"
                                    class="block w-full transition-all text-black ltr:text-left rtl:text-right relative py-[8px] px-[20px] hover:bg-gray-50 dark:text-white dark:hover:bg-black"
                                    [class.font-semibold]="selectedFilter === option.value"
                                    (click)="onFilterChange(option.value)"
                                >
                                    {{ option.labelKey | translate }}
                                </button>
                            </li>
                        }
                    </ul>
                }
            </div>
        </div>
        <div class="mt-[6.5px] -mb-[22px]">
            <div id="LEADS_PER_CAMPAIGN_chart"></div>
        </div>
    </div>
</div>
