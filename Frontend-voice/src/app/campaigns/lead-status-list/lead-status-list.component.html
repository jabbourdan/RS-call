<div class="space-y-1">
    <!-- Existing status items -->
    @for (status of statuses; track status; let i = $index) {
        <div class="flex items-center gap-1 bg-gray-50 dark:bg-[#0d1829] border border-gray-200 dark:border-gray-600 rounded-md px-2 py-1">
            <span class="flex-1 text-sm text-gray-800 dark:text-white truncate" dir="rtl">{{ status }}</span>

            <!-- Move up -->
            @if (i > 0) {
                <button
                    type="button"
                    (click)="moveUp(i)"
                    class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
                    [attr.aria-label]="'CAMPAIGNS.STATUSES_MOVE_UP_ARIA' | translate: { value: status }"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            } @else {
                <span class="p-1 w-5"></span>
            }

            <!-- Move down -->
            @if (i < statuses.length - 1) {
                <button
                    type="button"
                    (click)="moveDown(i)"
                    class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
                    [attr.aria-label]="'CAMPAIGNS.STATUSES_MOVE_DOWN_ARIA' | translate: { value: status }"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            } @else {
                <span class="p-1 w-5"></span>
            }

            <!-- Remove -->
            <button
                type="button"
                (click)="remove(i)"
                [disabled]="statuses.length <= 1"
                class="p-1 text-red-400 hover:text-red-600 disabled:opacity-30 disabled:cursor-not-allowed"
                [attr.aria-label]="'CAMPAIGNS.STATUSES_REMOVE_ARIA' | translate: { value: status }"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    }

    <!-- Inline-add row -->
    <div class="flex gap-2 mt-2">
        <input
            type="text"
            [(ngModel)]="draftInput"
            name="statusDraft"
            (keydown)="onKeydown($event)"
            [placeholder]="'CAMPAIGNS.STATUSES_ADD_PLACEHOLDER' | translate"
            class="flex-1 border border-gray-200 dark:border-gray-600 rounded-md py-[6px] px-[10px] text-sm bg-white dark:bg-[#0a1020] text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:border-primary-500"
            dir="rtl"
        />
        <button
            type="button"
            (click)="add()"
            class="px-3 py-[6px] rounded-md text-sm font-medium bg-primary-500 text-white hover:bg-primary-600 transition-colors whitespace-nowrap"
        >
            {{ 'CAMPAIGNS.STATUSES_ADD_BUTTON' | translate }}
        </button>
    </div>

    <!-- Inline error -->
    @if (error) {
        <p class="text-[11px] text-red-500 mt-1">{{ error | translate }}</p>
    }
</div>
